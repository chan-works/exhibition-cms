name: Build & Release (Windows EXE)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: EXE 빌드
        run: pyinstaller build.spec --clean --noconfirm

      - name: EXE 확인
        run: dir dist\

      - name: GitHub Release에 EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ExhibitionCMS.exe
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## 다운로드
            **ExhibitionCMS.exe** 를 다운받아 실행하세요.

            ### 최초 실행 시
            - 관리자 권한으로 실행 권장 (방화벽 자동 설정)
            - 기본 계정: `admin` / `admin123`

            ### 웹 접속 (맥북 등)
            실행 후 같은 네트워크에서 `http://<이-PC-IP>:8080` 접속
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
